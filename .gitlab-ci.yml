    DEST_PATH: preview/tapsdk-doc-intl-$CI_MERGE_REQUEST_ID
  needs:
    - build_hk
mr_slack_hk:
  stage: notification
  extends:
    - .mixin_slack
    - .hk_mr_rules
  variables:
    BUILD_LOCATION: hk
    APP_PUBLIC_PATH: https://tds-preview.xdrnd.cn
    APP_ROUTER_BASE_URL: /tapsdk-doc-intl-$CI_MERGE_REQUEST_ID/
  needs:
    - upload_mr_assets_hk
  allow_failure: true
# docker build cn
docker_upload_cn:
  stage: upload
  extends:
    - .build-and-push-image
    - .cn_master_rules
  variables:
    DOCKER_REGISTRY_NAMESPACE: web-frontend
    DOCKER_REGISTRY_REPO: tapsdk-doc-cn
    DOCKERFILE: dockerfiles/cn.Dockerfile
    DOCKER_BUILD_PATH: .
  needs:
    - build_cn
  dependencies:
    - build_cn
deploy_cn:
  stage: deploy
  extends:
    - .deploy-kubefiles-production
    - .cn_master_rules
  environment:
    name: cn/production
  variables:
    PROJECT_PATH: tds/tapsdkdoc
    VALUES_FILENAME: bj_values.yaml
  needs:
    - docker_upload_cn
